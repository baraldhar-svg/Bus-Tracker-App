openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: FleetSaaS school bus tracking API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tenants
    description: Tenant management
  - name: passengers
    description: Passenger management
  - name: stations
    description: Station / stop management
  - name: drivers
    description: Driver management
  - name: vehicles
    description: Vehicle management
  - name: fleet
    description: Fleet swap operations
  - name: trips
    description: Active trip tracking
  - name: announcements
    description: Emergency notices
  - name: subscriptions
    description: Subscription & paywall
  - name: dashboard
    description: SuperAdmin analytics
  - name: routes
    description: Route & fleet assignment management
  - name: geocode
    description: Address-to-coordinate lookup

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── TENANTS ────────────────────────────────────────────────────────────────
  /tenants/me:
    get:
      operationId: getTenantMe
      tags: [tenants]
      summary: Get current tenant info
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  # ─── ANNOUNCEMENTS ──────────────────────────────────────────────────────────
  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List emergency notices for current tenant
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create an emergency announcement (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── STATIONS ───────────────────────────────────────────────────────────────
  /stations:
    get:
      operationId: listStations
      tags: [stations]
      summary: List all geofenced stations
      responses:
        "200":
          description: Station list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Station"
    post:
      operationId: createStation
      tags: [stations]
      summary: Add a new geofenced station (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Station"

  /stations/{id}:
    delete:
      operationId: deleteStation
      tags: [stations]
      summary: Delete a station
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── DRIVERS ────────────────────────────────────────────────────────────────
  /drivers:
    get:
      operationId: listDrivers
      tags: [drivers]
      summary: List all drivers for this tenant
      responses:
        "200":
          description: Driver list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Driver"
    post:
      operationId: createDriver
      tags: [drivers]
      summary: Add a new driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/active:
    get:
      operationId: getActiveDriver
      tags: [drivers]
      summary: Get currently assigned active driver
      responses:
        "200":
          description: Active driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  # ─── VEHICLES ───────────────────────────────────────────────────────────────
  /vehicles:
    get:
      operationId: listVehicles
      tags: [vehicles]
      summary: List all vehicles for this tenant
      responses:
        "200":
          description: Vehicle list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}:
    patch:
      operationId: patchVehicle
      tags: [vehicles]
      summary: Update vehicle tag (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleUpdate"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  # ─── FLEET SWAP ─────────────────────────────────────────────────────────────
  /fleet/swap:
    post:
      operationId: swapFleet
      tags: [fleet]
      summary: Emergency fleet swap — reassign driver and/or vehicle to active route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FleetSwapInput"
      responses:
        "200":
          description: Updated active driver info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  # ─── PASSENGERS ─────────────────────────────────────────────────────────────
  /passengers:
    get:
      operationId: listPassengers
      tags: [passengers]
      summary: List all passengers for today's trip checklist
      responses:
        "200":
          description: Passenger list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Passenger"
    post:
      operationId: createPassenger
      tags: [passengers]
      summary: Register a new passenger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassengerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"

  /passengers/{id}:
    get:
      operationId: getPassenger
      tags: [passengers]
      summary: Get passenger by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Passenger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"
    patch:
      operationId: updatePassenger
      tags: [passengers]
      summary: Update passenger profile or photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassengerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"

  /passengers/{id}/board:
    post:
      operationId: boardPassenger
      tags: [passengers]
      summary: Mark passenger as boarded (driver action)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated passenger with boarding status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"

  /passengers/{id}/unboard:
    post:
      operationId: unboardPassenger
      tags: [passengers]
      summary: Mark passenger as unboarded (driver action)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated passenger with pending status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"

  /passengers/{id}/leave:
    post:
      operationId: markPassengerLeave
      tags: [passengers]
      summary: Mark passenger as on leave (parent or admin action)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated passenger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"

  # ─── TRIPS ──────────────────────────────────────────────────────────────────
  /trips/active:
    get:
      operationId: getActiveTrip
      tags: [trips]
      summary: Get live tracking data for the active trip
      responses:
        "200":
          description: Active trip with live position and ETA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveTrip"

  /trips/timeline:
    get:
      operationId: getTripTimeline
      tags: [trips]
      summary: Get the tracking event timeline for today's trip
      responses:
        "200":
          description: Timeline events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineEvent"

  /trips/sos:
    post:
      operationId: triggerSos
      tags: [trips]
      summary: Trigger an emergency SOS alert
      responses:
        "200":
          description: SOS acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SosResponse"

  # ─── ROUTES ─────────────────────────────────────────────────────────────────
  /routes:
    get:
      operationId: listRoutes
      tags: [routes]
      summary: List all routes for this tenant
      responses:
        "200":
          description: Route list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Route"
    post:
      operationId: createRoute
      tags: [routes]
      summary: Create a new route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteInput"
      responses:
        "201":
          description: Created route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"

  /routes/{id}:
    patch:
      operationId: updateRoute
      tags: [routes]
      summary: Update route name or assigned driver/vehicle (fleet swap)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteUpdate"
      responses:
        "200":
          description: Updated route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"
    delete:
      operationId: deleteRoute
      tags: [routes]
      summary: Delete a route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /routes/{id}/stations:
    get:
      operationId: listRouteStations
      tags: [routes]
      summary: Get ordered stations for a route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ordered station list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RouteStation"
    post:
      operationId: addRouteStation
      tags: [routes]
      summary: Add a station to a route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteStationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteStation"

  /routes/{id}/stations/{stationId}:
    delete:
      operationId: removeRouteStation
      tags: [routes]
      summary: Remove a station from a route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: stationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /routes/{id}/stations/reorder:
    post:
      operationId: reorderRouteStations
      tags: [routes]
      summary: Reorder stations within a route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderStationsInput"
      responses:
        "200":
          description: Reordered stations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RouteStation"

  # ─── GEOCODE ────────────────────────────────────────────────────────────────
  /geocode:
    get:
      operationId: geocodeAddress
      tags: [geocode]
      summary: Look up coordinates for a station name or address (Nominatim)
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Geocode results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeocodeResult"

  # ─── SUBSCRIPTIONS ──────────────────────────────────────────────────────────
  /subscriptions/me:
    get:
      operationId: getMySubscription
      tags: [subscriptions]
      summary: Get current subscription status (includes trial info and paywall flag)
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/activate:
    post:
      operationId: activateSubscription
      tags: [subscriptions]
      summary: Activate or upgrade a subscription (mock payment)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionActivationInput"
      responses:
        "200":
          description: Activated subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  # ─── CALENDAR EVENTS ────────────────────────────────────────────────────────
  /calendar-events:
    get:
      operationId: listCalendarEvents
      tags: [calendar]
      summary: List calendar events for the tenant
      parameters:
        - in: query
          name: month
          schema:
            type: string
            description: Filter by AD month prefix YYYY-MM (optional)
      responses:
        "200":
          description: Calendar events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEventList"
    post:
      operationId: createCalendarEvent
      tags: [calendar]
      summary: Create a calendar event or holiday
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCalendarEventBody"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

  /calendar-events/{id}:
    patch:
      operationId: updateCalendarEvent
      tags: [calendar]
      summary: Update a calendar event
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCalendarEventBody"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
    delete:
      operationId: deleteCalendarEvent
      tags: [calendar]
      summary: Delete a calendar event
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── SUPERADMIN DASHBOARD ───────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Global platform statistics (SuperAdmin only)
      responses:
        "200":
          description: Global stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/tenants:
    get:
      operationId: listTenants
      tags: [dashboard]
      summary: List all tenant organizations (SuperAdmin only)
      responses:
        "200":
          description: Tenant list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TenantSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Tenant:
      type: object
      required: [id, name, currency, country]
      properties:
        id:
          type: integer
        name:
          type: string
        logoUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        currency:
          type: string
          enum: [NPR, USD]
        country:
          type: string
        createdAt:
          type: string
          format: date-time

    TenantSummary:
      type: object
      required: [id, name, vehicleCount, passengerCount, subscriptionTier]
      properties:
        id:
          type: integer
        name:
          type: string
        vehicleCount:
          type: integer
        passengerCount:
          type: integer
        subscriptionTier:
          type: string
          enum: [silver, gold, platinum, trial]
        monthlyRevenue:
          type: number

    Announcement:
      type: object
      required: [id, tenantId, message, severity, createdAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        message:
          type: string
        messageNe:
          type: ["string", "null"]
        severity:
          type: string
          enum: [info, warning, emergency]
        createdAt:
          type: string
          format: date-time

    AnnouncementInput:
      type: object
      required: [message, severity]
      properties:
        message:
          type: string
        messageNe:
          type: string
        severity:
          type: string
          enum: [info, warning, emergency]

    Route:
      type: object
      required: [id, tenantId, name, isActive]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        name:
          type: string
        driverId:
          type: ["integer", "null"]
        vehicleId:
          type: ["integer", "null"]
        isActive:
          type: boolean
        driverName:
          type: ["string", "null"]
        vehiclePlate:
          type: ["string", "null"]

    RouteInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        driverId:
          type: integer
        vehicleId:
          type: integer

    RouteUpdate:
      type: object
      properties:
        name:
          type: string
        driverId:
          type: ["integer", "null"]
        vehicleId:
          type: ["integer", "null"]
        isActive:
          type: boolean

    RouteStation:
      type: object
      required: [id, routeId, stationId, position]
      properties:
        id:
          type: integer
        routeId:
          type: integer
        stationId:
          type: integer
        position:
          type: integer
        stationName:
          type: string
        lat:
          type: number
        lng:
          type: number
        radius:
          type: integer

    RouteStationInput:
      type: object
      required: [stationId]
      properties:
        stationId:
          type: integer
        position:
          type: integer

    ReorderStationsInput:
      type: object
      required: [orderedStationIds]
      properties:
        orderedStationIds:
          type: array
          items:
            type: integer

    GeocodeResult:
      type: object
      required: [displayName, lat, lng]
      properties:
        displayName:
          type: string
        lat:
          type: number
        lng:
          type: number

    Station:
      type: object
      required: [id, name, lat, lng]
      properties:
        id:
          type: integer
        name:
          type: string
        lat:
          type: number
        lng:
          type: number
        radius:
          type: integer
        tenantId:
          type: integer

    StationInput:
      type: object
      required: [name, lat, lng]
      properties:
        name:
          type: string
        lat:
          type: number
        lng:
          type: number
        radius:
          type: integer

    Driver:
      type: object
      required: [id, name, phone, vehicleNumber]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        photoUrl:
          type: ["string", "null"]
        vehicleNumber:
          type: string
        isActive:
          type: boolean

    DriverInput:
      type: object
      required: [name, phone, vehicleNumber]
      properties:
        name:
          type: string
        phone:
          type: string
        photoUrl:
          type: string
        vehicleNumber:
          type: string

    Vehicle:
      type: object
      required: [id, plateNumber, model]
      properties:
        id:
          type: integer
        plateNumber:
          type: string
        model:
          type: string
        capacity:
          type: integer
        isActive:
          type: boolean
        tag:
          type: string
          nullable: true

    VehicleUpdate:
      type: object
      properties:
        tag:
          type: string
          nullable: true

    FleetSwapInput:
      type: object
      required: [driverId, vehicleId]
      properties:
        driverId:
          type: integer
        vehicleId:
          type: integer
        reason:
          type: string

    Passenger:
      type: object
      required: [id, name, role, status, stationId]
      properties:
        id:
          type: integer
        name:
          type: string
        photoUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [student, staff]
        status:
          type: string
          enum: [pending, boarded, leave]
        stationId:
          type: integer
        routeId:
          type: ["integer", "null"]
        stationName:
          type: ["string", "null"]
        boardedAt:
          type: ["string", "null"]
          format: date-time
        liveToday:
          type: integer
          description: 1 if the passenger confirmed they are riding today, 0 otherwise
        quickMessage:
          type: ["string", "null"]
          description: Last quick status message sent by the passenger

    PassengerInput:
      type: object
      required: [name, role, stationId]
      properties:
        name:
          type: string
        photoUrl:
          type: string
        role:
          type: string
          enum: [student, staff]
        stationId:
          type: integer

    PassengerUpdate:
      type: object
      properties:
        name:
          type: string
        photoUrl:
          type: string
        stationId:
          type: integer
        routeId:
          type: ["integer", "null"]
        liveToday:
          type: integer
        quickMessage:
          type: string

    ActiveTrip:
      type: object
      required: [tripId, currentLat, currentLng, etaMinutes, nextStationName, routeName]
      properties:
        tripId:
          type: integer
        currentLat:
          type: number
        currentLng:
          type: number
        etaMinutes:
          type: integer
        nextStationName:
          type: string
        routeName:
          type: string
        boardedCount:
          type: integer
        totalPassengers:
          type: integer
        driver:
          $ref: "#/components/schemas/Driver"

    TimelineEvent:
      type: object
      required: [id, time, description, status]
      properties:
        id:
          type: integer
        time:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [completed, in_progress, upcoming]

    SosResponse:
      type: object
      required: [acknowledged, message]
      properties:
        acknowledged:
          type: boolean
        message:
          type: string

    Subscription:
      type: object
      required: [id, userRole, tier, isActive, trialDaysRemaining, paywallActive]
      properties:
        id:
          type: integer
        userRole:
          type: string
          enum: [parent, driver, admin, superadmin]
        tier:
          type: string
          enum: [trial, silver, gold, platinum, flat_premium]
